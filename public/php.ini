[PHP]
; Configuration des limites d'upload
; Augmente les limites pour permettre les uploads de fichiers volumineux

; Limite de taille POST (défaut 8M)
post_max_size = 100M

; Limite de taille d'upload de fichier (défaut 2M)
upload_max_filesize = 100M

; Timeout pour traitement des uploads (défaut 300s)
max_input_time = 600

; Timeout d'exécution des scripts (défaut 30s)
max_execution_time = 600

; Mémoire disponible pour PHP (défaut 128M)
memory_limit = 256M
